apiVersion: apps/v1
kind: Deployment
metadata:
  name: cofrap-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cofrap-frontend
  template:
    metadata:
      labels:
        app: cofrap-frontend
    spec:
      containers:
        - name: frontend
          image: fatymbaye/cofrap-frontend:0.3.0
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cofrap-frontend
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: cofrap-frontend
  ports:
    - name: http
      port: 80
      targetPort: http


