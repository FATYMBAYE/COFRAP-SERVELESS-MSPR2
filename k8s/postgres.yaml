# Namespace dedie aux composants de donnees du projet COFRAP.
apiVersion: v1
kind: Namespace
metadata:
  name: cofrap-data
---
# Script execute automatiquement lors de la premiere initialisation PostgreSQL.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: cofrap-data
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id BIGSERIAL PRIMARY KEY,
      username VARCHAR(255) NOT NULL UNIQUE,
      password_hash TEXT NOT NULL,
      mfa_secret TEXT NOT NULL,
      generated_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP,
      expires_at TIMESTAMPTZ NOT NULL,
      active BOOLEAN NOT NULL DEFAULT FALSE
    );

    CREATE INDEX IF NOT EXISTS idx_users_username
      ON users (username);
    CREATE TABLE IF NOT EXISTS credential_deliveries (
      id BIGSERIAL PRIMARY KEY,
      user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      token_hash CHAR(64) NOT NULL UNIQUE,
      password_ciphertext TEXT NOT NULL,
      provisioning_uri_ciphertext TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP,
      expires_at TIMESTAMPTZ NOT NULL,
      used_at TIMESTAMPTZ NULL,
      CONSTRAINT credential_deliveries_expiry_check
        CHECK (expires_at > created_at)
    );

    CREATE INDEX IF NOT EXISTS idx_credential_deliveries_user_id
      ON credential_deliveries (user_id);

    CREATE INDEX IF NOT EXISTS idx_credential_deliveries_expires_at
      ON credential_deliveries (expires_at);
---
# Volume persistant : les donnees survivent au redemarrage du pod PostgreSQL.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: cofrap-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: cofrap-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          # Les identifiants proviennent du Secret Kubernetes cree separement.
          envFrom:
            - secretRef:
                name: cofrap-postgres-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Minikube peut etre lent apres une veille. La startupProbe laisse
          # PostgreSQL terminer sa recuperation avant les controles reguliers.
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-init
          configMap:
            name: postgres-init
---
# Service interne au cluster. Il n'est pas expose directement sur Internet.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cofrap-data
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres


